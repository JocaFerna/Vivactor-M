services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8080:80"     # Public entrypoint
      - "8081:8080"   # Traefik dashboard (optional)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shared_network
    

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173" # Vite's default dev port is 5173
      
    volumes:
      - ./frontend:/app           # Syncs your code
      - /app/node_modules         # Prevents local modules from overwriting container modules
    environment:
      - CHOKIDAR_USEPOLLING=true  # Necessary for WSL/Docker to detect file saves
    command: npm run dev
    env_file: "frontend.env"
    networks:
      - shared_network
    

  architecture-retrieval:
    build: 
      context: ./architecture-retrieval
      dockerfile: Dockerfile 
    ports:  
      - "8000:8000" # Assuming your backend runs on port 8000~
      
    volumes:
      - ./architecture-retrieval:/app
      - ./repositories/downloads:/api/downloads
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.41 # Optional: helps Go SDK negotiate version
    env_file:
      - ./architecture-retrieval/.env
    # TODO: In production, it shouldn't run as root. You can set a specific user or use a non-root image.
    user: "1000:1000"
    group_add:
      - "998"
    stop_grace_period: 20s # Give it more time to clean up containers on shutdown
    networks:
      - shared_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arch.rule=Host(`architecture.localhost`)"
      - "traefik.http.services.arch.loadbalancer.server.port=8000"

  code2dfd:
    build: 
      context: ./code2DFD
      dockerfile: Dockerfile 
    ports:  
      - "5001:5001" # Assuming your backend runs on port 5001
    volumes:
      - ./code2DFD:/app
      - ./repositories/downloads:/app/downloads
    env_file:
      - dev.env
    networks:
      - shared_network

networks:
  shared_network:
    name: shared_network
    external: true